name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0-alpha.1 && git push origin v0.1.0-alpha.1
#
# Tags containing a pre-release suffix (a `-`, e.g. `-alpha.1`, `-rc.1`) are
# published as GitHub *pre-releases*; a clean `vX.Y.Z` tag is a full release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  # Never cut a release from broken code: re-run the hermetic checks on the tag.
  verify:
    name: verify (fmt · clippy · doc · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
      - run: cargo test --workspace

  # Build a release binary of the example indexer and attach it to the release.
  build:
    name: build (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build example (release)
        run: cargo build --release -p subdex-example-transfers --bin transfers --target ${{ matrix.target }}
      - name: Package
        run: |
          tarball="subdex-transfers-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$tarball" transfers
          echo "ARTIFACT=$tarball" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARTIFACT }}

  # Create the GitHub Release with auto-generated notes and the built artifacts.
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate auto-generated notes
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Determine pre-release
        id: prerelease
        run: |
          # A tag with a `-` (e.g. v0.1.0-alpha.1) is a pre-release.
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
            echo "kind=pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "kind=release" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            ${{ steps.prerelease.outputs.flag }} \
            artifacts/**/*.tar.gz
